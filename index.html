<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#fff;
    overflow:hidden;
    padding:15px;
}

.card{
    width:100%;
    max-width:380px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(12px);
    padding:25px 20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 1.2s ease;
}

h1{
    margin:0;
    font-size:1.8em;
}

#message{
    font-size:1.1em;
    margin:20px 0;
    min-height:60px;
    line-height:1.4;
}

button{
    border:none;
    padding:12px 16px;
    margin:8px 5px;
    border-radius:30px;
    font-size:0.95em;
    cursor:pointer;
    transition:.3s;
    width:100%;
    max-width:220px;
}

.sorry{ background:#ff6b81; color:white; }
.forgive{ background:#2ed573; color:white; }
.runaway{
    position:absolute;
    background:#ffa502;
    color:white;
}

.music-btn{
    background:#3742fa;
    color:white;
}

button:hover{
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.heart{
    position:absolute;
    font-size:20px;
    animation: float 4s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0); opacity:1;}
    100%{transform:translateY(-700px); opacity:0;}
}

@media(max-width:400px){
    h1{ font-size:1.5em; }
    #message{ font-size:1em; }
}
</style>
</head>

<body>

<div class="card">
    <h1>I'm Really Sorry 💔</h1>
    <div id="message">Please give me a chance to explain 😔</div>

    <button class="sorry" onclick="nextSorry()">Hear My Apology 💌</button>
    <button class="forgive" onclick="forgive()">I Forgive You ❤️</button>
    <button class="music-btn" onclick="toggleMusic()">🎵 Music</button>
    <button class="runaway" id="noBtn">Still Angry 😤</button>
</div>

<!-- Background Music -->
<audio id="bgMusic" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
</audio>

<script>
const messages = [
"I’m really sorry for what I did 😔",
"I never meant to hurt you 💔",
"I know I messed up, and I regret it 🥺",
"You mean a lot to me, more than you think 💖",
"I promise I’ll do better from now on 💞",
"Please forgive me… I miss our vibe 😞",
"You’re very special to me 💕"
];

let index = 0;

function nextSorry(){
    document.getElementById("message").innerText = messages[index];
    index = (index + 1) % messages.length;
    hearts();
}

function forgive(){
    document.getElementById("message").innerText =
    "Thank you 🥺❤️ I promise I’ll never hurt you again.";
    hearts(25);
}

// Music control
const music = document.getElementById("bgMusic");

window.addEventListener("load", () => {
    music.volume = 0.4;
    music.play().catch(() => {});
});

// Mobile autoplay fix
document.body.addEventListener("click", () => {
    music.play();
}, { once: true });

function toggleMusic(){
    if(music.paused){
        music.play();
    } else {
        music.pause();
    }
}

// Runaway button
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("touchstart", moveBtn);
noBtn.addEventListener("mouseover", moveBtn);

function moveBtn(){
    noBtn.style.top = Math.random()*70 + "%";
    noBtn.style.left = Math.random()*70 + "%";
}

// Hearts animation
function hearts(count=6){
    for(let i=0;i<count;i++){
        let heart = document.createElement("div");
        heart.className="heart";
        heart.innerText="💖";
        heart.style.left = Math.random()*100+"%";
        heart.style.fontSize = (15+Math.random()*25)+"px";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),4000);
    }
}
</script>

</body>
</html>
